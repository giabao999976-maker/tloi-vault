<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLOI VAULT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:20px;
color:#8b5cf6;
}

.card{
background:#131a2e;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:15px;
background:linear-gradient(90deg,#3b82f6,#a855f7);
color:white;
font-size:16px;
font-weight:bold;
}

.plan{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:10px;
}

.plan h3{
margin-bottom:5px;
}

.price{
font-size:22px;
font-weight:bold;
color:#facc15;
}
</style>
</head>

<body>

<div class="logo">TLOI VAULT</div>

<div class="card">
<h2>Nhập License Key</h2>

<input type="text" placeholder="XXXX-XXXX-XXXX">

<button>TIẾP TỤC</button>
</div>

<div class="card">
<h2>Các Gói Key</h2>

<div class="plan">
<h3>1 NGÀY</h3>
<div class="price">30.000đ</div>
</div>

<div class="plan">
<h3>1 TUẦN</h3>
<div class="price">60.000đ</div>
</div>

<div class="plan">
<h3>1 THÁNG</h3>
<div class="price">120.000đ</div>
</div>

<div class="plan">
<h3>VĨNH VIỄN</h3>
<div class="price">300.000đ</div>
</div>

</div>

</body>
</html>
